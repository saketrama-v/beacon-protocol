name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
      - name: Install Dependencies
        run: cd beacon-backend && npm ci || npm install
      - name: Run Backend Tests
        run: cd beacon-backend && npm test

  test-python-sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          cd beacon-sdk-python
          python -m pip install --upgrade pip
          pip install pytest responses
          pip install -e .
      - name: Run Pytest
        run: |
          cd beacon-sdk-python
          python -m pytest
