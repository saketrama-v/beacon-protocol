services:
  - type: web
    name: beacon-backend
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: beacon-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: beacon-redis
          property: connectionString
      - key: CORS_ORIGIN
        value: https://beacon-dashboard.vercel.app
      - key: CLERK_SECRET_KEY
        sync: false

  - type: redis
    name: beacon-redis
    ipAllowList: []
    plan: free

databases:
  - name: beacon-db
    databaseName: beacon
    user: beacon_user
    plan: free
